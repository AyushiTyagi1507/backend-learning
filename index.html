<!DOCTYPE html>
<html>

<head>
    <title>Join Us</title>
</head>

<body>

    <h2>Join Us Form</h2>

    <form id="joinForm">
        <input id="forName" placeholder="First Name"><br><br>
        <input id="lastName" placeholder="Last Name"><br><br>
        <input id="staticEmail" placeholder="Email"><br><br>
        <input id="phoneNumber" placeholder="Phone"><br><br>
        <input id="forCompany" placeholder="LinkedIn"><br><br>

        <select id="inquiryType">
            <option>Select Area of Interest</option>
            <option>Web Dev</option>
        </select><br><br>

        <select id="roleType">
            <option>Select Interest</option>
            <option>Intern</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <script src="script.js"></script>

</body>

</html>
